name: Update hub webtool index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,20 * * *"
  push:
    paths:
      - "teacher-webtool-hub/data.js"
      - "scripts/update-hub-tools.js"
      - ".github/workflows/update-hub-tools.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate webtool index
        run: node scripts/update-hub-tools.js

      - name: Commit updated index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update generated hub webtool index
          file_pattern: teacher-webtool-hub/generated-tools.js
