<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>수학 수업 웹툴 모음</title>
    <link rel="stylesheet" href="./assets/site.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="수학 수업 웹툴 모음 홈">
        <span class="brand-mark">M</span>
        <span>
          <strong>수학 수업 웹툴 모음</strong>
          <small>교실에서 바로 쓰는 활동형 수학 도구</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="상단 메뉴">
        <a class="ghost-link" data-github-link href="#" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="workspace-shell" aria-labelledby="page-title">
        <div class="page-heading">
          <div>
            <p class="eyebrow">과목 선택</p>
            <h1 id="page-title">수업에서 사용할 과목을 고르세요</h1>
          </div>
          <p>
            과목을 선택하면 그 안에 준비된 웹툴이 한 번에 나타납니다.
            지금은 첫 과목으로 인공지능 수학을 시작합니다.
          </p>
        </div>

        <div class="subject-layout">
          <aside class="subject-panel" aria-label="과목 목록">
            <button class="subject-button is-active" type="button" data-subject="ai-math">
              <span class="subject-icon">AI</span>
              <span>
                <strong>인공지능 수학</strong>
                <small>벡터, 유사도, 데이터 분류 실습</small>
              </span>
            </button>
          </aside>

          <section class="tool-panel" aria-labelledby="subject-title">
            <div class="subject-summary">
              <div>
                <p class="eyebrow">선택한 과목</p>
                <h2 id="subject-title">인공지능 수학</h2>
              </div>
              <span class="tool-count">웹툴 1개</span>
            </div>

            <div class="tool-grid">
              <article class="tool-card">
                <div class="tool-card-top">
                  <span class="tool-badge">실습</span>
                  <span class="tool-meta">브라우저 전용</span>
                </div>
                <h3>감성 분석 인공지능 만들기 실습</h3>
                <p>
                  긍정/부정 문장을 직접 모으고, 문자 n-gram 벡터와 코사인 유사도로
                  새 문장의 감성을 분류해 봅니다.
                </p>
                <div class="tool-actions">
                  <a class="primary-link" href="./ai-math/sentiment-ai/">시작하기</a>
                  <a class="secondary-link" data-github-link href="#" target="_blank" rel="noreferrer">
                    GitHub
                  </a>
                </div>
              </article>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
